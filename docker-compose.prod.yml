# Production stack: app + Postgres + Redis + Caddy (auto-HTTPS) + cron.
# Run with:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# ${VAR} interpolation below reads from the --env-file (.env.production).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
        NEXT_PUBLIC_VAPID_KEY: ${NEXT_PUBLIC_VAPID_KEY}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: always
    env_file: .env.production
    environment:
      # Canonical in-network URLs — override anything in the env file
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ekonobar
      # No pooler in-network — DIRECT_URL mirrors DATABASE_URL so `prisma migrate deploy`
      # (schema.prisma datasource.directUrl) has a target on the Docker path too.
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ekonobar
      REDIS_URL: redis://redis:6379
      TRUST_PROXY: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ekonobar
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ekonobar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_prod:/data

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  cron:
    image: alpine:3.20
    restart: always
    environment:
      CRON_SECRET: ${CRON_SECRET}
    volumes:
      - ./deploy/cron-entrypoint.sh:/cron-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/cron-entrypoint.sh"]
    depends_on:
      - app

volumes:
  postgres_prod:
  redis_prod:
  caddy_data:
  caddy_config:
